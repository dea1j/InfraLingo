version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: infralingo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: infralingo
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: infralingo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: infralingo-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
volumes:
  pgdata:
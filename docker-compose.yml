version: '3.8'

services:
  backend:
    build: ./backend
    container_name: infralingo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./backend/.env 

  frontend:
    build: ./frontend
    container_name: infralingo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend